<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Basics & Box Model</title>
    <link rel="stylesheet" href="lab3-styles.css">

    <style>
        h1 {
            font-style: italic;
            text-decoration: underline;
        }

        /* 3. Styling the new div */
        .box-container {
            border: 2px solid #333;
            padding: 20px;
            margin: 30px;
            background-color: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1 style="color: blue;">Styled Heading</h1>

    <p>This paragraph uses external CSS for color and font size.</p>

    <div class="box-container">
        <h2>The Box Model</h2>
        <p>This div has custom padding, margin, and a solid border to demonstrate spacing.</p>
    </div>

</body>
</html>
